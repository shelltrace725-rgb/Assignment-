<div class="people-list">
  <div class="toolbar">
    <h2>People</h2>
    <button (click)="addPerson()">Add Person</button>
  </div>

  <div *ngIf="isLoading">Loading...</div>
  <div *ngIf="loadError" class="error">{{ loadError }}</div>

  <table *ngIf="!isLoading && people?.length">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let person of people; trackBy: trackById">
        <td>{{ person.id }}</td>
        <td>{{ person.name }}</td>
        <td>{{ person.email }}</td>
        <td>
          <button (click)="editPerson(person)">Edit</button>
          <button (click)="deletePerson(person)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!isLoading && !people?.length">
    No people found.
  </div>
</div>
